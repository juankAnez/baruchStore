{% extends "base/admin_base.html" %}
{% block title %}Configuración - Baruch Store{% endblock %}
{% block page_title %}Configuración del Negocio{% endblock %}

{% block content %}
<div class="bg-white rounded-xl border border-gray-100 p-6 shadow-sm">
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nombre del Negocio</label>
                <input type="text" name="business_name" value="{{ settings.get('business_name', '') }}" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Número de WhatsApp</label>
                <input type="text" name="whatsapp" value="{{ settings.get('whatsapp', '') }}" placeholder="+59170000000" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Usuario de Instagram</label>
                <input type="text" name="instagram" value="{{ settings.get('instagram', '') }}" placeholder="@baruchstore" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Facebook</label>
                <input type="text" name="facebook" value="{{ settings.get('facebook', '') }}" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico</label>
                <input type="email" name="email" value="{{ settings.get('email', '') }}" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Dirección</label>
                <input type="text" name="address" value="{{ settings.get('address', '') }}" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Horarios</label>
                <input type="text" name="hours" value="{{ settings.get('hours', '') }}" placeholder="Lun-Sab: 9:00 - 18:00" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Texto del Pie de Página</label>
                <input type="text" name="footer_text" value="{{ settings.get('footer_text', '') }}" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
            </div>
            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700 mb-1">Mensaje Automático WhatsApp</label>
                <textarea name="whatsapp_message" rows="3" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">{{ settings.get('whatsapp_message', '¡Hola! Quiero hacer un pedido:') }}</textarea>
            </div>
        </div>
        <div class="mt-6">
            <button type="submit" class="btn-primary text-sm"><i class="fas fa-save mr-2"></i>Guardar Cambios</button>
        </div>
    </form>
</div>
{% endblock %}
