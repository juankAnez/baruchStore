<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block meta_description %}Baruch Store - Tu catálogo digital de confianza{% endblock %}">
    <meta property="og:title" content="{% block og_title %}Baruch Store{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Descubre nuestra colección exclusiva{% endblock %}">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#4f46e5">
    <title>{% block title %}Baruch Store{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <link href="{{ url_for('static', filename='css/output.css') }}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/htmx.org@2.0.2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        window.BARUCH_CONFIG = {
            whatsapp: '{{ settings.get("whatsapp", "") }}',
            whatsapp_message: '{{ settings.get("whatsapp_message", "¡Hola! Quiero hacer un pedido:") }}',
            business_name: '{{ settings.get("business_name", "Baruch Store") }}',
        };
    </script>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-brand-50/20">
    {% block body %}{% endblock %}

    <!-- Product Detail Modal Container -->
    <div x-data x-show="$store.productDetailModal.open" x-cloak class="fixed inset-0 z-[60] flex items-center justify-end" @keydown.escape.window="$store.productDetailModal.close()">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-black/35 backdrop-blur-sm"
             x-show="$store.productDetailModal.open"
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0"
             @click="$store.productDetailModal.close()"></div>
        <!-- Modal Drawer Content -->
        <div class="relative w-full max-w-2xl h-full bg-white shadow-float flex flex-col overflow-y-auto scrollbar-thin"
             x-show="$store.productDetailModal.open"
             x-transition:enter="transition ease-out duration-300 transform"
             x-transition:enter-start="translate-x-full"
             x-transition:enter-end="translate-x-0"
             x-transition:leave="transition ease-in duration-200 transform"
             x-transition:leave-start="translate-x-0"
             x-transition:leave-end="translate-x-full"
             id="product-detail-modal-content">
             <!-- HTMX will load content here -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 600, once: true, easing: 'ease-out-cubic', offset: 60 });
    </script>
    <script src="{{ url_for('static', filename='js/cart.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
