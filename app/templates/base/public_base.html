<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block meta_description %}Baruch Store - Catálogo Digital{% endblock %}">
    <meta property="og:title" content="{% block og_title %}Baruch Store{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Descubre nuestra colección{% endblock %}">
    <meta property="og:type" content="website">
    <title>{% block title %}Baruch Store{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/output.css') }}" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/htmx.org@2.0.2"></script>
    <style>
        [x-cloak] { display: none !important; }
        .skeleton {
            @apply bg-gray-200 animate-pulse rounded;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-white text-gray-900 font-sans antialiased" x-data="app()" x-init="initCart()">
    {% block body %}{% endblock %}

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script>
        AOS.init({ duration: 800, once: true, easing: 'ease-out-cubic' });
    </script>
    <script src="{{ url_for('static', filename='js/cart.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
