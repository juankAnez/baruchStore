<div
    x-show="$store.cart.open"
    x-cloak
    class="fixed inset-0 z-[60]"
    style="display: none;"
>
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" @click="$store.cart.open = false"></div>
    <div class="absolute right-0 top-0 h-full w-full max-w-md bg-white shadow-2xl" @click.stop>
        <div class="flex flex-col h-full">
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
                <h2 class="text-lg font-semibold text-gray-900">Tu Carrito</h2>
                <button @click="$store.cart.open = false" class="p-2 text-gray-400 hover:text-gray-600 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>

            <div class="flex-1 overflow-y-auto px-6 py-4">
                <template x-if="$store.cart.items.length === 0">
                    <div class="flex flex-col items-center justify-center h-full text-center">
                        <svg class="w-16 h-16 text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 100 4 2 2 0 000-4z"/></svg>
                        <p class="text-gray-400 font-medium">Tu carrito está vacío</p>
                        <p class="text-gray-400 text-sm mt-1">Agrega productos para empezar</p>
                    </div>
                </template>

                <template x-for="(item, index) in $store.cart.items" :key="item.id">
                    <div class="flex gap-4 py-4 border-b border-gray-100 last:border-0">
                        <div class="w-20 h-20 rounded-lg bg-gray-50 overflow-hidden shrink-0">
                            <img :src="item.image ? '/static/images/productos/' + item.image : ''" :alt="item.name" class="w-full h-full object-cover">
                        </div>
                        <div class="flex-1 min-w-0">
                            <h3 class="text-sm font-medium text-gray-900 truncate" x-text="item.name"></h3>
                            <p class="text-sm text-gray-500 mt-1" x-text="'$' + item.price.toFixed(2)"></p>
                            <div class="flex items-center gap-3 mt-2">
                                <div class="flex items-center border border-gray-200 rounded-lg">
                                    <button @click="$store.cart.decreaseQuantity(index)" class="px-2.5 py-1 text-gray-500 hover:text-gray-700 hover:bg-gray-50 transition-colors">−</button>
                                    <span class="px-3 py-1 text-sm font-medium text-gray-900" x-text="item.quantity"></span>
                                    <button @click="$store.cart.increaseQuantity(index)" class="px-2.5 py-1 text-gray-500 hover:text-gray-700 hover:bg-gray-50 transition-colors">+</button>
                                </div>
                                <button @click="$store.cart.removeItem(index)" class="text-gray-400 hover:text-red-500 transition-colors">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <div class="border-t border-gray-100 px-6 py-4" x-show="$store.cart.items.length > 0">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-sm text-gray-500">Subtotal</span>
                    <span class="text-sm font-medium text-gray-900" x-text="'$' + $store.cart.subtotal.toFixed(2)"></span>
                </div>
                <div class="flex items-center justify-between mb-4">
                    <span class="text-base font-semibold text-gray-900">Total</span>
                    <span class="text-xl font-bold text-gray-900" x-text="'$' + $store.cart.total.toFixed(2)"></span>
                </div>
                <a :href="$store.cart.whatsappUrl" target="_blank" class="w-full btn-primary text-sm mb-2 flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                    Enviar por WhatsApp
                </a>
                <button @click="$store.cart.clearCart()" class="w-full py-2.5 text-sm text-gray-500 hover:text-red-500 transition-colors">
                    Vaciar carrito
                </button>
            </div>
        </div>
    </div>
</div>
