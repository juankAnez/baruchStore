<div x-show="$store.cart.open" x-cloak class="fixed inset-0 z-[60]">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/35 backdrop-blur-sm" 
         x-show="$store.cart.open" 
         x-transition:enter="transition ease-out duration-300" 
         x-transition:enter-start="opacity-0" 
         x-transition:enter-end="opacity-100" 
         x-transition:leave="transition ease-in duration-200"
         @click="$store.cart.open = false"></div>
         
    <!-- Drawer Panel -->
    <div class="absolute right-0 top-0 h-full w-full max-w-md bg-white shadow-float flex flex-col"
         x-show="$store.cart.open"
         x-transition:enter="transition ease-out duration-300 transform" 
         x-transition:enter-start="translate-x-full" 
         x-transition:enter-end="translate-x-0"
         x-transition:leave="transition ease-in duration-200 transform" 
         x-transition:leave-start="translate-x-0" 
         x-transition:leave-end="translate-x-full"
         @click.stop>
         
        <!-- Header -->
        <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100">
            <div class="flex items-center gap-2">
                <i data-lucide="shopping-cart" class="w-5 h-5 text-gray-800"></i>
                <h2 class="text-base font-bold text-gray-900 tracking-tight">Mi Carrito</h2>
                <span x-show="$store.cart.count > 0" x-text="$store.cart.count" class="bg-brand-50 text-brand-700 text-xs font-bold px-2 py-0.5 rounded-full border border-brand-100"></span>
            </div>
            <button @click="$store.cart.open = false" class="btn-icon p-2 rounded-full hover:bg-gray-100">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <!-- Empty State -->
        <div class="flex-1 flex flex-col items-center justify-center px-5 text-center" x-show="$store.cart.items.length === 0">
            <div class="w-16 h-16 bg-gray-50 rounded-2xl flex items-center justify-center mb-4 text-gray-300">
                <i data-lucide="shopping-bag" class="w-8 h-8"></i>
            </div>
            <p class="text-base font-bold text-gray-900 mb-1">Tu carrito está vacío</p>
            <p class="text-sm text-gray-400 mb-6">Explora nuestra tienda para agregar productos</p>
            <button @click="$store.cart.open = false; window.location.href='{{ url_for('catalog.catalog') }}'" class="btn btn-secondary btn-sm text-xs font-semibold px-5 py-2.5">
                Explorar catálogo
            </button>
        </div>

        <!-- Cart Items List & Shipping Form -->
        <div class="flex-1 overflow-y-auto px-5 py-3 scrollbar-thin divide-y divide-gray-100" x-show="$store.cart.items.length > 0">
            <!-- Items -->
            <div class="space-y-1 pb-4">
                <template x-for="(item, index) in $store.cart.items" :key="item.id">
                    <div class="flex gap-3.5 py-4 first:pt-2">
                        <div class="w-16 h-16 rounded-xl bg-gray-50 border border-gray-150/40 overflow-hidden shrink-0">
                            <img :src="item.image ? '/static/images/productos/' + item.image : ''" :alt="item.name" class="w-full h-full object-cover">
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-bold text-gray-900 truncate" x-text="item.name"></p>
                            <p class="text-sm font-semibold text-brand-600 mt-0.5" x-text="'$' + item.price.toFixed(2)"></p>
                            <div class="flex items-center justify-between mt-2.5">
                                <div class="flex items-center border border-gray-200 rounded-lg bg-gray-50/50">
                                    <button @click="$store.cart.decreaseQuantity(index)" class="w-7 h-7 flex items-center justify-center text-gray-500 hover:text-gray-900 hover:bg-gray-100 rounded-l-lg transition-colors"><i data-lucide="minus" class="w-3 h-3"></i></button>
                                    <span class="w-7 h-7 flex items-center justify-center text-xs font-bold text-gray-900" x-text="item.quantity"></span>
                                    <button @click="$store.cart.increaseQuantity(index)" class="w-7 h-7 flex items-center justify-center text-gray-500 hover:text-gray-900 hover:bg-gray-100 rounded-r-lg transition-colors"><i data-lucide="plus" class="w-3 h-3"></i></button>
                                </div>
                                <button @click="$store.cart.removeItem(index)" class="text-gray-400 hover:text-red-500 transition-colors p-1.5 rounded-lg hover:bg-red-50">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <!-- Shipping Information Accordion / Form -->
            <div class="py-5" x-data="{ formOpen: true }">
                <button @click="formOpen = !formOpen" class="w-full flex items-center justify-between py-2 text-xs font-bold text-gray-900 uppercase tracking-widest hover:text-brand-600 transition-colors">
                    <span>Datos de Envío</span>
                    <i data-lucide="chevron-down" class="w-4 h-4 transition-transform duration-200 text-gray-400" :class="formOpen ? 'rotate-180' : ''"></i>
                </button>
                <div x-show="formOpen" class="mt-4 space-y-3.5">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">Nombre Completo</label>
                        <input type="text" x-model="$store.cart.shippingForm.name" placeholder="Ej. Juan Pérez" class="w-full px-3.5 py-2.5 text-sm bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-brand-500 focus:bg-white focus:ring-4 focus:ring-brand-500/10 transition-all">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">Dirección de Entrega</label>
                        <input type="text" x-model="$store.cart.shippingForm.address" placeholder="Calle, Número, Colonia, Ciudad" class="w-full px-3.5 py-2.5 text-sm bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-brand-500 focus:bg-white focus:ring-4 focus:ring-brand-500/10 transition-all">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">Teléfono</label>
                            <input type="tel" x-model="$store.cart.shippingForm.phone" placeholder="Ej. 5512345678" class="w-full px-3.5 py-2.5 text-sm bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-brand-500 focus:bg-white focus:ring-4 focus:ring-brand-500/10 transition-all">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">Método de Pago</label>
                            <select x-model="$store.cart.shippingForm.payment" class="w-full px-3.5 py-2.5 text-sm bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-brand-500 focus:bg-white focus:ring-4 focus:ring-brand-500/10 transition-all">
                                <option value="Efectivo">Efectivo</option>
                                <option value="Transferencia">Transferencia</option>
                                <option value="Tarjeta">Tarjeta</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer / Checkout Actions -->
        <div class="border-t border-gray-100 bg-gray-50/50 px-5 py-5 space-y-4 shadow-elevated" x-show="$store.cart.items.length > 0">
            <div class="flex items-center justify-between">
                <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Total del Pedido</span>
                <span class="text-xl font-black text-gray-900" x-text="'$' + $store.cart.total.toFixed(2)"></span>
            </div>
            
            <!-- Store WhatsApp configured number injected dynamically -->
            <button @click="$store.cart.whatsappNumber = '{{ settings.get('whatsapp')|replace('+', '')|replace(' ', '') }}'; $store.cart.checkoutWhatsApp()" 
                    class="btn-whatsapp w-full py-3.5 rounded-xl flex items-center justify-center gap-2 font-bold shadow-md hover:shadow-lg transition-all text-sm">
                <i data-lucide="message-circle" class="w-5 h-5 text-white stroke-[2.5]"></i>
                Enviar Pedido por WhatsApp
            </button>
            
            <button @click="$store.cart.clearCart()" class="w-full py-2 text-xs font-bold text-gray-400 hover:text-red-500 transition-colors uppercase tracking-widest">
                Vaciar carrito
            </button>
        </div>
    </div>
</div>
