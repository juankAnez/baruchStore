{% for product in products %}
<a href="{{ url_for('catalog.product_detail', slug=product.slug) }}" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 transition-colors">
    {% if product.primary_image %}
    <img src="{{ url_for('static', filename='images/productos/' + product.primary_image) }}" alt="{{ product.name }}" class="w-12 h-12 object-cover rounded-lg">
    {% else %}
    <div class="w-12 h-12 rounded-lg bg-gray-100 flex items-center justify-center">
        <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
    </div>
    {% endif %}
    <div class="flex-1 min-w-0">
        <p class="text-sm font-medium text-gray-900 truncate">{{ product.name }}</p>
        <p class="text-sm text-gray-500">${{ "%.2f"|format(product.price) }}</p>
    </div>
</a>
{% else %}
<div class="px-4 py-6 text-center text-gray-400 text-sm">
    No se encontraron productos
</div>
{% endfor %}
