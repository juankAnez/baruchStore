<nav class="navbar navbar-solid"
     x-data="{ mobileOpen: false }">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16 lg:h-18">
            <a href="{{ url_for('catalog.home') }}" class="flex items-center gap-2.5 group">
                <div class="w-9 h-9 bg-gray-900 text-brand-300 rounded-xl flex items-center justify-center shadow-sm transition-transform duration-300 group-hover:scale-105 overflow-hidden">
                    {% set logo = settings.get('logo', '') %}
                    {% if logo %}
                    <img src="{{ url_for('static', filename='images/logo/' + logo) }}" alt="{{ settings.get('business_name', 'Baruch Store') }}" class="w-full h-full object-cover">
                    {% else %}
                    <span class="font-bold text-base text-brand-300 font-display">{{ settings.get('business_name', 'B')[:1] }}</span>
                    {% endif %}
                </div>
                <span class="text-base font-display font-extrabold tracking-tight text-gray-900">
                    {{ settings.get('business_name', 'Baruch Store') }}
                </span>
            </a>

            <!-- Desktop Navigation -->
            <div class="hidden lg:flex items-center gap-1">
                <a href="{{ url_for('catalog.home') }}" class="px-4 py-2 text-sm font-semibold rounded-xl transition-all duration-200 text-gray-600 hover:text-gray-900 hover:bg-gray-50">
                    Inicio
                </a>
                <a href="{{ url_for('catalog.catalog') }}" class="px-4 py-2 text-sm font-semibold rounded-xl transition-all duration-200 text-gray-600 hover:text-gray-900 hover:bg-gray-50">
                    Catálogo
                </a>
            </div>

            <!-- Action Buttons -->
            <div class="flex items-center gap-1.5">
                <button @click="$store.cart.open = !$store.cart.open"
                        class="relative btn-icon text-gray-500 hover:text-gray-900 hover:bg-gray-50">
                    <i data-lucide="shopping-cart" class="w-5 h-5"></i>
                    <span x-show="$store.cart.count > 0" x-text="$store.cart.count" class="absolute -top-0.5 -right-0.5 bg-brand-500 text-white text-[10px] font-bold w-4.5 h-4.5 rounded-full flex items-center justify-center ring-2 ring-white"></span>
                </button>

                <button @click="mobileOpen = !mobileOpen" class="lg:hidden btn-icon text-gray-500 hover:bg-gray-50">
                    <i x-show="!mobileOpen" data-lucide="menu" class="w-5 h-5"></i>
                    <i x-show="mobileOpen" x-cloak data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
        </div>

        <!-- Mobile Menu -->
        <div x-show="mobileOpen" x-cloak x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 -translate-y-2" x-transition:enter-end="opacity-100 translate-y-0" class="lg:hidden pb-5 pt-2">
            <div class="space-y-1 bg-white rounded-2xl p-3 shadow-elevated border border-gray-100">
                <a href="{{ url_for('catalog.home') }}" class="flex items-center gap-2.5 px-4 py-2.5 text-sm font-semibold text-gray-700 hover:bg-gray-50 rounded-xl">
                    <i data-lucide="home" class="w-4 h-4 text-gray-400"></i>
                    Inicio
                </a>
                <a href="{{ url_for('catalog.catalog') }}" class="flex items-center gap-2.5 px-4 py-2.5 text-sm font-semibold text-gray-700 hover:bg-gray-50 rounded-xl">
                    <i data-lucide="grid" class="w-4 h-4 text-gray-400"></i>
                    Catálogo
                </a>
            </div>
        </div>
    </div>
</nav>
