{% for product in products %}
    {% include 'public/_product_card.html' %}
{% else %}
<div class="col-span-full">
    <div class="empty-state py-16 flex flex-col items-center justify-center text-center">
        <div class="w-16 h-16 bg-gray-150/40 rounded-2xl flex items-center justify-center mb-4 text-gray-400">
            <i data-lucide="package" class="w-8 h-8"></i>
        </div>
        <h3 class="text-lg font-bold text-gray-900 mb-1">No se encontraron productos</h3>
        <p class="text-sm text-gray-500 mb-4">Intenta con otros filtros o términos de búsqueda</p>
        <a href="{{ url_for('catalog.catalog') }}" class="btn btn-secondary btn-sm text-xs px-4 py-2">Limpiar filtros</a>
    </div>
</div>
{% endfor %}
